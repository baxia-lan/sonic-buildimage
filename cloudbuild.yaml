# SONiC Buildimage — GCP Cloud Build CI pipeline
#
# Trigger: push to `claude` branch
# Machine: N1_HIGHCPU_32 (32 vCPU, 28.8 GB RAM)
# Timeout: 2 hours
# Disk:    200 GB
#
# Results:
#   - Cloud Build console: console.cloud.google.com/cloud-build/builds;region=global
#   - GCS summary: gs://sonic-bazel-cache/ci-results/$BUILD_ID/summary.txt
#   - GitHub commit status (when _GITHUB_TOKEN is configured)
#
# Architecture notes:
#   - Bazelisk is installed to /workspace/.local/bin (persists across steps)
#   - Bazel output root is set to /workspace/.cache/bazel via startup flag
#     so build outputs persist across steps (each step is a fresh container)
#   - Each ubuntu step installs its own apt deps (cheap, avoids volume bugs)
#   - --config=ci pulls remote cache settings from .bazelrc
#
# CI integrity:
#   This pipeline validates the checked-in repo state. It does NOT:
#   - Rewrite submodule SHAs to different commits
#   - Download BUILD.bazel or other tracked files from external repos
#   - Mutate checked-in files with sed or similar tools
#   If builds fail because submodule BUILD files are not committed,
#   the fix is to commit those files, not to add CI workarounds.

substitutions:
  _CACHE_BUCKET: "sonic-bazel-cache"

availableSecrets:
  secretManager:
    - versionName: projects/yilanji-sandbox-163694/secrets/github-token/versions/latest
      env: 'GITHUB_TOKEN'

options:
  machineType: "N1_HIGHCPU_32"
  diskSizeGb: "200"
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
  env:
    - "BAZELISK_HOME=/workspace/.cache/bazelisk"
    # Cloud Build's $COMMIT_SHA / $BUILD_ID are YAML substitutions, not
    # environment variables. Export them here so scripts invoked from a
    # step (e.g. scripts/ci/post_step_failure.sh) can read them from env.
    - "COMMIT_SHA=$COMMIT_SHA"
    - "BUILD_ID=$BUILD_ID"

timeout: "10800s"

steps:
  # ── Step 1: Install Bazelisk ─────────────────────────────────────────────────
  - id: "install-bazelisk"
    name: "gcr.io/cloud-builders/curl"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        echo ">>> [install-bazelisk] Downloading Bazelisk v1.25.0..."
        mkdir -p /workspace/.local/bin
        curl -fsSL -o /workspace/.local/bin/bazel \
          https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64
        chmod +x /workspace/.local/bin/bazel
        echo ">>> [install-bazelisk] Installed at /workspace/.local/bin/bazel"
    waitFor: ["-"]
    timeout: "120s"

  # ── Step 2: Init submodules ──────────────────────────────────────────────────
  - id: "init-submodules"
    name: "gcr.io/cloud-builders/git"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        echo ">>> [init-submodules] Initializing all submodules recursively..."
        git submodule update --init --recursive
        SUBMOD_COUNT=$$(git submodule status | wc -l)
        echo ">>> [init-submodules] Initialized $$SUBMOD_COUNT submodules"
    waitFor: ["-"]
    timeout: "600s"

  # ── Steps 3-4 REMOVED (CI integrity) ──────────────────────────────────────────
  # Previously, "align-submodules" rewrote submodule SHAs to hardcoded commits
  # and "copy-build-files" downloaded BUILD.bazel/MODULE.bazel/config.h from
  # external GitHub forks at CI time. Both steps violated CI integrity:
  #   - CI must validate checked-in repo state, not synthesize a different repo
  #   - Tracked files must not be downloaded from external sources during CI
  #   - BUILD files must not be mutated with sed during CI
  #
  # To make CI green for targets that depend on submodule BUILD files:
  #   1. Commit BUILD.bazel into the submodule forks at a recorded SHA, OR
  #   2. Update submodule gitlinks to point to fork SHAs that include BUILD files, OR
  #   3. Track BUILD overlays in build/overlays/ in this repo
  # Do NOT restore the download/mutation workaround.

  # ── Step 5: GitHub pending status ────────────────────────────────────────────
  - id: "github-status-pending"
    name: "gcr.io/cloud-builders/curl"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ -z "$$GITHUB_TOKEN" ]; then
          echo ">>> [github-status] GITHUB_TOKEN not available from Secret Manager, skipping"
          echo ">>> View logs: https://console.cloud.google.com/cloud-build/builds;region=global?project=yilanji-sandbox-163694"
          exit 0
        fi
        curl -fsSL -X POST \
          -H "Authorization: token $$GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/baxia-lan/sonic-buildimage/statuses/$COMMIT_SHA" \
          -d "{
            \"state\": \"pending\",
            \"target_url\": \"https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=yilanji-sandbox-163694\",
            \"description\": \"Cloud Build in progress (N1_HIGHCPU_32)\",
            \"context\": \"cloud-build/bazel\"
          }" && echo ">>> [github-status] Pending status set" \
          || echo ">>> [github-status] WARN: Could not set status (non-fatal)"
    waitFor: ["-"]
    secretEnv: ['GITHUB_TOKEN']
    timeout: "60s"

  # ── Step 6: Build orchagent chain (Gate 1 critical path) ──────────────────────
  # Uses gcr.io/cloud-builders/docker because Bazel genrules in the dep closure
  # (src/sonic-swss, src/sonic-sairedis, src/libyang, src/libnl3) shell out to
  # `docker run` inside no-sandbox actions. Plain ubuntu:22.04 has no docker
  # CLI and those genrules fail with "docker: command not found".
  - id: "build-orchagent"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    env:
      - "PATH=/workspace/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "HOME=/workspace/.home"
    args:
      - "-c"
      - |
        STEP=build-orchagent
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        # INLINE heartbeat: proves the step started and the token can post
        # statuses. Bypasses scripts/ci/post_step_failure.sh so a script bug
        # cannot mask the signal.
        curl -sS -o /tmp/hb-body.txt -w "HB_INLINE_HTTP=%{http_code}\n" -X POST \
          -H "Authorization: token $$GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/baxia-lan/sonic-buildimage/statuses/$COMMIT_SHA" \
          -d "{\"state\":\"pending\",\"context\":\"cloud-build/build-orchagent/inline\",\"description\":\"inline heartbeat OK\",\"target_url\":\"https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=yilanji-sandbox-163694\"}" \
          || echo "HB_INLINE_CURL_FAILED"
        cat /tmp/hb-body.txt 2>/dev/null || true
        # Wrapper heartbeat: proves the wrapper script is reachable.
        bash scripts/ci/post_step_failure.sh --start "$$STEP" || true
        (
          set -euo pipefail
          echo ">>> [build-orchagent] Installing build dependencies..."
          export DEBIAN_FRONTEND=noninteractive
          # Do NOT suppress apt output; retry apt-get update once on
          # transient mirror failures (Ubuntu focal security mirror
          # intermittently refuses connections from GCP networks).
          # Ubuntu focal archive.ubuntu.com / security.ubuntu.com are
          # unreachable from Cloud Build's GCE network (all 9 mirror IPs
          # time out). Swap to the regional GCE-hosted Ubuntu mirror
          # before apt-get update. Evidence: build 1206896c-9130-4c5c on
          # commit 0c875eff2 — every archive.ubuntu.com IP timed out.
          sed -i 's|http://archive.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g; s|http://security.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g' /etc/apt/sources.list
          apt-get update || { sleep 5; apt-get update; }
          apt-get install -y -qq \
            curl git python3 build-essential bc bison flex \
            libssl-dev libelf-dev fakeroot dpkg-dev
          echo ">>> [build-orchagent] docker: $$(docker --version 2>&1 || echo MISSING)"
          echo ">>> [build-orchagent] Starting orchagent chain build..."
          # Per-step output_user_root + symlink_prefix so parallel bazel
          # steps don't contend on a shared output-base lock. Remote cache
          # (GCS) is shared across steps so there's no redundant network I/O.
          #
          # Explicitly building the deb targets (swss_common_debs,
          # sairedis_debs, swss_debs) promotes them to top-level outputs
          # so --remote_download_toplevel materializes them on local disk
          # for downstream unit-tests and pytest-vs to consume.
          bazel --output_user_root=/workspace/.cache/bazel-orch \
            build \
              //dockers/docker-orchagent:docker_orchagent \
              //src/sonic-swss-common:swss_common_debs \
              //src/sonic-sairedis:sairedis_debs \
              //src/sonic-swss:swss_debs \
              //src/sonic-dash-api:sonic_dash_api_debs \
            --symlink_prefix=/workspace/bazel-orch- \
            --config=ci \
            --spawn_strategy=local \
            --strategy=CopyToDirectory=local \
            --local_ram_resources=20000 \
            --jobs=16 \
            2>&1

          echo ""
          echo ">>> [build-orchagent] === RESULTS ==="
          DEB_COUNT=$$(find /workspace/bazel-orch-bin/src -name "*.deb" -size +0 2>/dev/null | wc -l)
          echo "$$DEB_COUNT deb packages produced:"
          find /workspace/bazel-orch-bin/src -name "*.deb" -size +0 2>/dev/null | sort
          echo ">>> [build-orchagent] DONE"
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["init-submodules", "install-bazelisk"]
    timeout: "3600s"

  # ── Step 7: Build kernel (Gate 3 dependency) ─────────────────────────────────
  # Requires //src/sonic-linux-kernel:linux_kernel_debs BUILD to be checked in.
  # If it is not committed, this step will fail honestly. Do not swallow failures.
  - id: "build-kernel"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    env:
      - "PATH=/workspace/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "HOME=/workspace/.home"
    args:
      - "-c"
      - |
        STEP=build-kernel
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [build-kernel] Installing build dependencies..."
          export DEBIAN_FRONTEND=noninteractive
          # Do NOT suppress apt output: when apt fails we need the stderr
          # in the failure comment (post_step_failure.sh tails $$LOG).
          # Retry apt-get update once — the Ubuntu focal security mirror
          # (91.189.91.82) intermittently refuses connections from GCP.
          # Ubuntu focal archive.ubuntu.com / security.ubuntu.com are
          # unreachable from Cloud Build's GCE network (all 9 mirror IPs
          # time out). Swap to the regional GCE-hosted Ubuntu mirror
          # before apt-get update. Evidence: build 1206896c-9130-4c5c on
          # commit 0c875eff2 — every archive.ubuntu.com IP timed out.
          sed -i 's|http://archive.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g; s|http://security.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g' /etc/apt/sources.list
          apt-get update || { sleep 5; apt-get update; }
          apt-get install -y -qq \
            curl git python3 build-essential bc bison flex \
            libssl-dev libelf-dev cpio kmod rsync dwarves \
            fakeroot dpkg-dev
          mkdir -p /workspace/.home
          echo ">>> [build-kernel] Disk: $$(df -h / | tail -1 | awk '{print $$4}') free, CPUs: $$(nproc)"

          echo ">>> [build-kernel] Starting kernel build (--config=ci + remote cache)..."
          # Per-step output_user_root avoids shared-lock contention with
          # other parallel bazel steps. Skipping `bazel version` (it does
          # not block_for_lock and was failing fast on shared roots).
          bazel --output_user_root=/workspace/.cache/bazel-krn \
            build //src/sonic-linux-kernel:linux_kernel_debs \
            --symlink_prefix=/workspace/bazel-krn- \
            --config=ci \
            --spawn_strategy=local \
            --local_ram_resources=20000 \
            --jobs=16 \
            2>&1

          echo ""
          echo ">>> [build-kernel] === RESULTS ==="
          ls -lh /workspace/bazel-krn-bin/src/sonic-linux-kernel/*.deb 2>/dev/null && \
            echo ">>> [build-kernel] SUCCESS" || \
            { echo ">>> [build-kernel] FAIL: No kernel debs produced"; exit 1; }
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["init-submodules", "install-bazelisk"]
    timeout: "3600s"

  # ── Step 7b: Build all service images (parallel with VS build) ──────────────
  - id: "build-service-images"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    env:
      - "PATH=/workspace/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "HOME=/workspace/.home"
    args:
      - "-c"
      - |
        STEP=build-service-images
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [build-service-images] Installing build dependencies..."
          export DEBIAN_FRONTEND=noninteractive
          # Do NOT suppress apt output; retry on transient mirror fails.
          # Ubuntu focal archive.ubuntu.com / security.ubuntu.com are
          # unreachable from Cloud Build's GCE network (all 9 mirror IPs
          # time out). Swap to the regional GCE-hosted Ubuntu mirror
          # before apt-get update. Evidence: build 1206896c-9130-4c5c on
          # commit 0c875eff2 — every archive.ubuntu.com IP timed out.
          sed -i 's|http://archive.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g; s|http://security.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g' /etc/apt/sources.list
          apt-get update || { sleep 5; apt-get update; }
          apt-get install -y -qq \
            curl git python3 build-essential fakeroot dpkg-dev
          echo ">>> [build-service-images] Building all service docker images..."
          # Per-step output_user_root so this runs in parallel with
          # build-orchagent and build-kernel without bazel lock contention.
          bazel --output_user_root=/workspace/.cache/bazel-svc \
            build \
              //dockers/docker-database:docker_database \
              //dockers/docker-teamd:docker_teamd \
              //dockers/docker-nat:docker_nat \
              //dockers/docker-sflow:docker_sflow \
              //dockers/docker-stp:docker_stp \
              //dockers/docker-iccpd:docker_iccpd \
              //dockers/docker-router-advertiser:docker_router_advertiser \
              //dockers/docker-basic_router:docker_basic_router \
            --symlink_prefix=/workspace/bazel-svc- \
            --config=ci \
            --spawn_strategy=local \
            --strategy=CopyToDirectory=local \
            --local_ram_resources=20000 \
            --jobs=16 \
            2>&1
          echo ">>> [build-service-images] DONE"
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["init-submodules", "install-bazelisk"]
    timeout: "3600s"

  # ── Step 8: Build docker-sonic-vs (parallel; needs orchagent + service-images outputs) ─
  - id: "build-docker-sonic-vs"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    env:
      - "PATH=/workspace/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "HOME=/workspace/.home"
    args:
      - "-c"
      - |
        STEP=build-docker-sonic-vs
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [build-docker-sonic-vs] Installing build dependencies..."
          export DEBIAN_FRONTEND=noninteractive
          # Do NOT suppress apt output; retry on transient mirror fails.
          # Ubuntu focal archive.ubuntu.com / security.ubuntu.com are
          # unreachable from Cloud Build's GCE network (all 9 mirror IPs
          # time out). Swap to the regional GCE-hosted Ubuntu mirror
          # before apt-get update. Evidence: build 1206896c-9130-4c5c on
          # commit 0c875eff2 — every archive.ubuntu.com IP timed out.
          sed -i 's|http://archive.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g; s|http://security.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g' /etc/apt/sources.list
          apt-get update || { sleep 5; apt-get update; }
          apt-get install -y -qq \
            curl git python3 build-essential fakeroot dpkg-dev
          echo ">>> [build-docker-sonic-vs] Starting build..."
          # Per-step output_user_root. Needs both build-orchagent
          # (sonic-swss debs) and build-service-images (other service
          # docker images) outputs via remote cache.
          bazel --output_user_root=/workspace/.cache/bazel-vs \
            build //platform/vs:docker_sonic_vs_tarball \
            --symlink_prefix=/workspace/bazel-vs- \
            --config=ci \
            --spawn_strategy=local \
            --strategy=CopyToDirectory=local \
            --check_direct_dependencies=off \
            --local_ram_resources=20000 \
            --jobs=16 \
            2>&1

          echo ""
          echo ">>> [build-docker-sonic-vs] === RESULTS ==="
          ls -lh /workspace/bazel-vs-bin/platform/vs/docker_sonic_vs_tarball* 2>/dev/null && \
            echo ">>> [build-docker-sonic-vs] SUCCESS" || \
            echo ">>> [build-docker-sonic-vs] WARN: No tarball produced"
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["build-orchagent", "build-service-images"]
    timeout: "3600s"

  # ── Step 8a: Load and verify docker-sonic-vs ─────────────────────────────────
  - id: "verify-docker-sonic-vs"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        STEP=verify-docker-sonic-vs
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [verify-vs] Loading docker-sonic-vs image..."
          # build-docker-sonic-vs uses --symlink_prefix=/workspace/bazel-vs-
          bash /workspace/bazel-vs-bin/platform/vs/docker_sonic_vs_tarball.sh
          docker tag sonic/docker_sonic_vs:latest docker-sonic-vs:latest
          docker images docker-sonic-vs

          echo ">>> [verify-vs] Quick content check..."
          docker run --rm --entrypoint /bin/bash docker-sonic-vs:latest -c '
            python3 -c "from swsscommon import swsscommon; print(\"swsscommon: OK\")" 2>&1 || echo "swsscommon: FAILED"
            echo "sonic-cfggen: $$(sonic-cfggen --help 2>&1 | head -3 || echo BROKEN)"
            echo "ip: $$(ip link show lo 2>&1 | head -1)"
          '

          echo ">>> [verify-vs] Boot test..."
          CID=$$(docker run -d --privileged docker-sonic-vs:latest)
          sleep 5
          CSTATE=$$(docker inspect -f '{{.State.Status}}' $$CID 2>/dev/null || echo "unknown")
          echo "Container state after 5s: $$CSTATE"
          if [ "$$CSTATE" != "running" ]; then
            echo "FATAL: Container not running"
            docker logs $$CID 2>&1 | tail -30
            docker rm $$CID 2>/dev/null || true
            exit 1
          fi

          echo ">>> [verify-vs] Waiting 120s for services..."
          BOOTED=false
          for i in $$(seq 1 24); do
            SVCCOUNT=$$(docker exec $$CID supervisorctl status 2>/dev/null | grep -c RUNNING || true)
            echo "  $${i}x5s: $$SVCCOUNT services RUNNING"
            if [ "$$SVCCOUNT" -gt 5 ]; then
              echo ">>> [verify-vs] Services booted: $$SVCCOUNT RUNNING"
              BOOTED=true
              break
            fi
            sleep 5
          done
          echo ">>> [verify-vs] === Service status ==="
          docker exec $$CID supervisorctl status 2>&1 || true
          if [ "$$BOOTED" != "true" ]; then
            echo ">>> [verify-vs] === Container logs (last 100 lines) ==="
            docker logs $$CID 2>&1 | tail -100 || true
            echo ">>> [verify-vs] === start.sh exit details ==="
            docker exec $$CID cat /var/log/syslog 2>/dev/null | tail -50 || true
            echo ">>> [verify-vs] === rsyslogd library check ==="
            docker exec $$CID ldd /usr/sbin/rsyslogd 2>&1 | grep -i 'not found' || echo "All rsyslog libs found"
            echo ">>> [verify-vs] === redis-server library check ==="
            docker exec $$CID ldd /usr/bin/redis-server 2>&1 | grep -i 'not found' || echo "All redis libs found"
            echo ">>> [verify-vs] === syncd library check ==="
            docker exec $$CID ldd /usr/bin/syncd 2>&1 | grep -i 'not found' || echo "All syncd libs found"
            echo ">>> [verify-vs] === jq check ==="
            docker exec $$CID jq --version 2>&1 || echo "jq: NOT FOUND"
            echo ">>> [verify-vs] === supervisord log (syncd/orchagent lines) ==="
            docker logs $$CID 2>&1 | grep -E 'syncd|orchagent|start\.sh' | tail -30 || true
          fi
          docker stop $$CID 2>/dev/null; docker rm $$CID 2>/dev/null || true
          if [ "$$BOOTED" = "true" ]; then
            echo ">>> [verify-vs] PASS"
          else
            echo ">>> [verify-vs] FAIL: Fewer than 6 services reached RUNNING"
            exit 1
          fi
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["build-docker-sonic-vs"]
    timeout: "600s"

  # ── Step 8b: swss-common unit tests ──────────────────────────────────────────
  - id: "swss-common-unit-tests"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        STEP=swss-common-unit-tests
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [swss-common-tests] Running swss-common C++ unit tests..."
          echo ">>> [swss-common-tests] Finding debs..."
          # Temp dir must live under /workspace for host docker daemon to
          # bind-mount; /tmp is step-container-only on Cloud Build DinD.
          mkdir -p /workspace/.ci-tmp/swss-common-tests
          STAGING=$$(mktemp -d -p /workspace/.ci-tmp/swss-common-tests)
          # build-orchagent produces swss-common debs; per-step symlink is
          # /workspace/bazel-orch-bin. Check that + fallback full scan.
          for d in /workspace/bazel-orch-bin /workspace/.cache/bazel-orch; do
            find "$$d" -name "libswsscommon*.deb" -size +0 2>/dev/null | while read f; do cp "$$f" "$$STAGING/" 2>/dev/null || true; done
            find "$$d" -name "python3-swsscommon*.deb" -size +0 2>/dev/null | while read f; do cp "$$f" "$$STAGING/" 2>/dev/null || true; done
            find "$$d" -name "swss-common*.deb" -size +0 2>/dev/null | while read f; do cp "$$f" "$$STAGING/" 2>/dev/null || true; done
          done
          echo ">>> [swss-common-tests] Found $$(ls $$STAGING/*.deb 2>/dev/null | wc -l) debs"

          docker run --rm --platform linux/amd64 \
            -v "$$STAGING:/debs:ro" \
            -v "$$(pwd)/src/sonic-swss-common:/src:ro" \
            -e DEBIAN_FRONTEND=noninteractive \
            debian:bookworm-slim bash -c '
              set -euo pipefail
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                redis-server build-essential cmake \
                libgtest-dev libgmock-dev \
                libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libnl-nf-3-dev \
                libhiredis-dev libzmq3-dev libboost-dev libboost-serialization-dev \
                libprotobuf-dev protobuf-compiler pkg-config \
                libyang2-dev nlohmann-json3-dev uuid-dev \
                python3-dev swig autoconf automake libtool autoconf-archive \
                git m4 >/dev/null 2>&1
              dpkg --force-overwrite --force-depends -i /debs/*.deb 2>&1 || true
              apt-get install -f -y -qq 2>/dev/null || true
              ldconfig
              redis-server --daemonize yes --bind 127.0.0.1
              cp -a /src /tmp/swss-common-test && cd /tmp/swss-common-test
              find . -name .git -type f -delete 2>/dev/null || true; rm -rf .git
              git config --global user.email build@sonic && git config --global user.name sonic
              git init -q && git add -A . && git commit -qm init 2>/dev/null || true
              ./autogen.sh 2>&1 | tail -3
              # --disable-python2 because python2-dev is not installed; AX_CODE_COVERAGE
              # and AX_ADD_AM_MACRO_STATIC come from autoconf-archive (added above).
              ./configure --disable-python2 2>&1 | tail -5
              make -j$$(nproc) tests/tests 2>&1 | tail -10
              echo ">>> Running GTest..."
              ./tests/tests --gtest_output=xml:/tmp/test-results.xml 2>&1
            '
          echo ">>> [swss-common-tests] DONE"
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["build-orchagent"]
    timeout: "1800s"

  # ── Step 8c: sairedis unit tests (parallel with VS build) ────────────────────
  - id: "sairedis-unit-tests"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        STEP=sairedis-unit-tests
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [sairedis-tests] Running sairedis C++ unit tests..."
          mkdir -p /workspace/.ci-tmp/sairedis-tests
          STAGING=$$(mktemp -d -p /workspace/.ci-tmp/sairedis-tests)
          # Scan build-orchagent cache (produces sairedis transitively).
          for d in /workspace/bazel-orch-bin /workspace/.cache/bazel-orch; do
            find "$$d" -name "*.deb" -size +0 2>/dev/null | while read f; do cp "$$f" "$$STAGING/" 2>/dev/null || true; done
          done
          docker run --rm --platform linux/amd64 \
            -v "$$STAGING:/debs:ro" \
            -v "$$(pwd)/src/sonic-sairedis:/src:ro" \
            -e DEBIAN_FRONTEND=noninteractive \
            debian:bookworm-slim bash -c '
              set -euo pipefail
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                redis-server build-essential cmake libgtest-dev libgmock-dev \
                libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libnl-nf-3-dev \
                libhiredis-dev libzmq3-dev libboost-dev libboost-serialization-dev \
                libprotobuf-dev protobuf-compiler pkg-config libyang2-dev nlohmann-json3-dev \
                uuid-dev python3-dev swig autoconf automake libtool autoconf-archive \
                perl aspell aspell-en libjansson-dev libteam-dev libjemalloc-dev \
                git m4 >/dev/null 2>&1
              dpkg --force-overwrite --force-depends -i /debs/*.deb 2>&1 || true
              apt-get install -f -y -qq 2>/dev/null || true; ldconfig
              redis-server --daemonize yes --bind 127.0.0.1
              cp -a /src /tmp/sairedis-test && cd /tmp/sairedis-test
              find . -name .git -type f -delete 2>/dev/null || true; rm -rf .git
              git config --global user.email build@sonic && git config --global user.name sonic
              git init -q && git add -A . && git commit -qm init 2>/dev/null || true
              for v in 1.10.0 1.11.0 1.12.0 1.13.0 1.14.0 1.15.0 1.16.0; do git tag v$$v 2>/dev/null || true; done
              ./autogen.sh 2>&1 | tail -3
              # --disable-python2 because python2-dev is not installed;
              # AX_CODE_COVERAGE/AX_PYTHON3_DEVEL/AX_ADD_AM_MACRO_STATIC come
              # from autoconf-archive (added above).
              ./configure --with-sai=vs --disable-python2 2>&1 | tail -5
              make -j$$(nproc) 2>&1 | tail -20
              cd tests && ./tests --gtest_output=xml:/tmp/sairedis-results.xml 2>&1
            '
          echo ">>> [sairedis-tests] DONE"
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["build-orchagent"]
    timeout: "1800s"

  # ── Step 8d: swss mock_tests (30 GTest, parallel with VS) ──────────────────
  - id: "swss-mock-tests"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        STEP=swss-mock-tests
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [swss-mock-tests] Running 6 GTest binaries..."
          mkdir -p /workspace/.ci-tmp/swss-mock-tests
          STAGING=$$(mktemp -d -p /workspace/.ci-tmp/swss-mock-tests)
          for d in /workspace/bazel-orch-bin /workspace/.cache/bazel-orch; do
            find "$$d" -name "*.deb" -size +0 2>/dev/null | while read f; do cp "$$f" "$$STAGING/" 2>/dev/null || true; done
          done
          docker run --rm --platform linux/amd64 \
            -v "$$STAGING:/debs:ro" \
            -v "$$(pwd)/src/sonic-swss:/src:ro" \
            -e DEBIAN_FRONTEND=noninteractive \
            debian:bookworm-slim bash -c '
              set -euo pipefail
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                redis-server build-essential cmake libgtest-dev libgmock-dev \
                libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libnl-nf-3-dev \
                libhiredis-dev libzmq3-dev libboost-dev libboost-serialization-dev \
                libprotobuf-dev protobuf-compiler pkg-config libyang2-dev nlohmann-json3-dev \
                uuid-dev python3-dev swig autoconf automake libtool \
                libjansson-dev libteam-dev libjemalloc-dev \
                git m4 >/dev/null 2>&1
              dpkg --force-overwrite --force-depends -i /debs/*.deb 2>&1 || true
              apt-get install -f -y -qq 2>/dev/null || true; ldconfig
              redis-server --daemonize yes --bind 127.0.0.1
              cp -a /src /tmp/swss-test && cd /tmp/swss-test
              find . -name .git -type f -delete 2>/dev/null || true; rm -rf .git
              git config --global user.email build@sonic && git config --global user.name sonic
              git init -q && git add -A . && git commit -qm init 2>/dev/null || true
              ./autogen.sh 2>&1 | tail -3 && ./configure --enable-tests 2>&1 | tail -5
              cd tests/mock_tests && make -j$$(nproc) 2>&1 | tail -20
              FAILED=0
              for t in tests tests_intfmgrd tests_teammgrd tests_portsyncd tests_fpmsyncd tests_response_publisher; do
                [ -f "./$$t" ] && { echo ">>> Running $$t"; ./$$t 2>&1 || FAILED=1; } || true
              done
              [ $$FAILED -eq 0 ] && echo "ALL PASSED" || { echo "SOME FAILED"; exit 1; }
            '
          echo ">>> [swss-mock-tests] DONE"
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["build-orchagent"]
    timeout: "2400s"

  # ── Step 9: Run pytest (inside bookworm container for lib compat) ────────────
  # The swss-common debs are built for Debian bookworm. Running pytest on the
  # Cloud Build host (Ubuntu) would fail due to mismatched shared libraries.
  # Instead, run pytest inside a bookworm container with docker.sock access.
  # conftest.py creates its own VS containers via the Docker Python client.
  - id: "pytest-vs"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        STEP=pytest-vs
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [pytest-vs] Checking for tarball..."
          # build-docker-sonic-vs uses --symlink_prefix=/workspace/bazel-vs-
          if [ ! -f /workspace/bazel-vs-bin/platform/vs/docker_sonic_vs_tarball.sh ]; then
            echo ">>> [pytest-vs] FAIL: docker_sonic_vs_tarball not built"
            exit 1
          fi

          echo ">>> [pytest-vs] Loading docker-sonic-vs image..."
          bash /workspace/bazel-vs-bin/platform/vs/docker_sonic_vs_tarball.sh
          docker tag sonic/docker_sonic_vs:latest docker-sonic-vs:latest

          echo ">>> [pytest-vs] Verifying swss-common debs..."
          # swss-common debs built by build-orchagent.
          SWSS_COMMON_DIR="/workspace/bazel-orch-bin/src/sonic-swss-common"
          if [ ! -d "$$SWSS_COMMON_DIR" ]; then
            # Fallback: scan orchagent cache dir directly
            SWSS_COMMON_DIR=$$(dirname "$$(find /workspace/.cache/bazel-orch -name 'libswsscommon*.deb' -size +0 2>/dev/null | head -1)")
          fi
          ls -lh "$$SWSS_COMMON_DIR"/*.deb

          DEBS_DIR=$$(realpath "$$SWSS_COMMON_DIR")
          TESTS_DIR=$$(realpath src/sonic-swss/tests)

          mkdir -p /var/run/redis-vs

          echo ">>> [pytest-vs] Running pytest inside bookworm container..."
          docker run --rm --privileged \
            --pid=host \
            --network=host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /var/run/redis-vs:/var/run/redis-vs \
            -v /var/run/netns:/var/run/netns \
            -v /lib/modules:/lib/modules:ro \
            -v "$$DEBS_DIR:/debs:ro" \
            -v "$$TESTS_DIR:/tests" \
            -e DEBIAN_FRONTEND=noninteractive \
            debian:bookworm-slim bash -c '
              set -euo pipefail

              echo "--- Install runtime dependencies ---"
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                python3 python3-pip python3-dev \
                docker.io iproute2 util-linux kmod ethtool procps \
                libhiredis0.14 libzmq5 \
                libnl-3-200 libnl-genl-3-200 libnl-route-3-200 libnl-nf-3-200 \
                libboost-serialization1.74.0 libyang2 libprotobuf32 \
                libssl3 libjemalloc2 libjansson4 uuid-runtime

              echo "--- Install swss-common debs ---"
              dpkg --force-overwrite --force-depends -i \
                /debs/libswsscommon_1.0.0_amd64.deb \
                /debs/python3-swsscommon_1.0.0_amd64.deb
              ldconfig

              echo "--- Verify swsscommon ---"
              python3 -c "from swsscommon import swsscommon; print(\"swsscommon: OK\")"

              echo "--- Install pytest ---"
              pip3 install --break-system-packages pytest pytest-timeout docker redis

              echo "--- Patch conftest.py: make modprobe team non-fatal ---"
              sed -i \
                -e "s/if subprocess.check_call.*modprobe.*team.*/subprocess.call([\"\/sbin\/modprobe\", \"team\"])  # patched: non-fatal/" \
                -e "/Cannot install kernel team module/d" \
                /tests/conftest.py

              echo "--- Run VS pytest suite ---"
              cd /tests
              pytest --imgname=docker-sonic-vs:latest -v \
                test_port.py test_acl.py test_route.py test_vlan.py test_crm.py \
                test_interface.py test_neighbor.py test_nhg.py test_fdb.py \
                -x --timeout=600
            '
          echo ">>> [pytest-vs] ALL TESTS PASSED"
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["verify-docker-sonic-vs"]
    timeout: "3600s"

  # ── Step 10: Build sonic-broadcom.bin (Gate 3 dependency) ────────────────────
  # Requires kernel BUILD and all broadcom deps to be checked in.
  # If they are not committed, this step will fail honestly.
  - id: "build-broadcom-bin"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    env:
      - "PATH=/workspace/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "HOME=/workspace/.home"
    args:
      - "-c"
      - |
        STEP=build-broadcom-bin
        mkdir -p /workspace/ci-logs
        LOG=/workspace/ci-logs/$$STEP.log
        (
          set -euo pipefail
          echo ">>> [build-broadcom-bin] Installing build dependencies..."
          export DEBIAN_FRONTEND=noninteractive
          # Do NOT suppress apt output; retry on transient mirror fails.
          # Ubuntu focal archive.ubuntu.com / security.ubuntu.com are
          # unreachable from Cloud Build's GCE network (all 9 mirror IPs
          # time out). Swap to the regional GCE-hosted Ubuntu mirror
          # before apt-get update. Evidence: build 1206896c-9130-4c5c on
          # commit 0c875eff2 — every archive.ubuntu.com IP timed out.
          sed -i 's|http://archive.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g; s|http://security.ubuntu.com|http://us-central1.gce.archive.ubuntu.com|g' /etc/apt/sources.list
          apt-get update || { sleep 5; apt-get update; }
          apt-get install -y -qq \
            curl git python3 build-essential fakeroot dpkg-dev
          echo ">>> [build-broadcom-bin] Starting build..."
          # Per-step output_user_root. Depends on build-kernel's outputs
          # via GCS remote cache (shared) — kernel's debs are re-fetched
          # rather than rebuilt from the previous step's local cache.
          bazel --output_user_root=/workspace/.cache/bazel-brd \
            build //platform/broadcom:sonic_broadcom_bin \
            --symlink_prefix=/workspace/bazel-brd- \
            --config=ci \
            --spawn_strategy=local \
            --strategy=CopyToDirectory=local \
            --local_ram_resources=20000 \
            --jobs=16 \
            2>&1

          echo ""
          echo ">>> [build-broadcom-bin] === RESULTS ==="
          if [ -f /workspace/bazel-brd-bin/platform/broadcom/sonic_broadcom_bin.bin ]; then
            SIZE_MB=$$(( $$(stat -c%s /workspace/bazel-brd-bin/platform/broadcom/sonic_broadcom_bin.bin) / 1048576 ))
            echo "sonic-broadcom.bin: $${SIZE_MB} MB"
            echo ">>> [build-broadcom-bin] SUCCESS"
          else
            echo ">>> [build-broadcom-bin] FAIL: no .bin produced"
            exit 1
          fi
        ) 2>&1 | tee "$$LOG"
        RC=$${PIPESTATUS[0]}
        bash scripts/ci/post_step_failure.sh "$$STEP" "$$LOG" "$$RC" || true
        exit $$RC
    secretEnv: ['GITHUB_TOKEN']
    waitFor: ["build-kernel"]
    timeout: "3600s"

  # ── Step 11: Upload results summary to GCS ───────────────────────────────────
  - id: "upload-summary"
    name: "gcr.io/cloud-builders/gsutil"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo ">>> [upload-summary] Generating build summary..."
        SUMMARY="/workspace/build-summary.txt"
        {
          echo "============================================"
          echo " SONiC Bazel Build -- CI Results"
          echo "============================================"
          echo ""
          echo "Build ID:  $BUILD_ID"
          echo "Commit:    $COMMIT_SHA"
          echo "Branch:    $BRANCH_NAME"
          echo "Timestamp: $$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Machine:   N1_HIGHCPU_32 (32 vCPU, 28.8 GB RAM)"
          echo "Disk:      200 GB"
          echo "Console:   https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=yilanji-sandbox-163694"
          echo ""
          echo "-- Kernel debs --"
          ls -lh /workspace/bazel-krn-bin/src/sonic-linux-kernel/*.deb 2>/dev/null || echo "  NOT BUILT"
          echo ""
          echo "-- Orchagent debs --"
          find /workspace/bazel-orch-bin/src -name "*.deb" -size +0 -exec ls -lh {} \; 2>/dev/null || echo "  NOT BUILT"
          echo ""
          echo "-- docker-sonic-vs --"
          ls -lh /workspace/bazel-vs-bin/platform/vs/docker_sonic_vs_tarball* 2>/dev/null || echo "  NOT BUILT"
          echo ""
          echo "-- sonic-broadcom.bin --"
          ls -lh /workspace/bazel-brd-bin/platform/broadcom/sonic_broadcom_bin.bin 2>/dev/null || echo "  NOT BUILT"
          echo ""
          echo "-- Disk usage --"
          df -h / 2>/dev/null | tail -1 || echo "  N/A"
          echo ""
          echo "============================================"
        } > "$$SUMMARY"

        echo "--- Summary ---"
        cat "$$SUMMARY"
        echo "--- End ---"

        gsutil cp "$$SUMMARY" "gs://${_CACHE_BUCKET}/ci-results/$BUILD_ID/summary.txt" 2>/dev/null && \
          echo ">>> Uploaded: gs://${_CACHE_BUCKET}/ci-results/$BUILD_ID/summary.txt" || \
          echo ">>> WARN: GCS upload failed (check bucket permissions)"
    # Wait for all gate-relevant steps before uploading summary.
    # If any step fails, Cloud Build cancels this step (honest failure).
    waitFor:
      - "build-orchagent"
      - "verify-docker-sonic-vs"
      - "pytest-vs"
      - "swss-common-unit-tests"
      - "sairedis-unit-tests"
      - "swss-mock-tests"
      - "build-kernel"
      - "build-service-images"
      - "build-broadcom-bin"
    timeout: "120s"

  # ── Step 12: GitHub final status ─────────────────────────────────────────────
  - id: "github-status-final"
    name: "gcr.io/cloud-builders/curl"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ -z "$$GITHUB_TOKEN" ]; then
          echo ">>> [github-status] GITHUB_TOKEN not available from Secret Manager, skipping"
          echo ""
          echo "=== HOW TO VIEW RESULTS ==="
          echo "Console: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=yilanji-sandbox-163694"
          echo "Summary: gsutil cat gs://${_CACHE_BUCKET}/ci-results/$BUILD_ID/summary.txt"
          echo "=========================="
          exit 0
        fi
        curl -fsSL -X POST \
          -H "Authorization: token $$GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/baxia-lan/sonic-buildimage/statuses/$COMMIT_SHA" \
          -d "{
            \"state\": \"success\",
            \"target_url\": \"https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=yilanji-sandbox-163694\",
            \"description\": \"Bazel build passed\",
            \"context\": \"cloud-build/bazel\"
          }" && echo ">>> [github-status] Success status set on $COMMIT_SHA" \
          || echo ">>> [github-status] WARN: Could not set final status"
    waitFor: ["upload-summary"]
    secretEnv: ['GITHUB_TOKEN']
    timeout: "60s"

# ── Artifact storage ─────────────────────────────────────────────────────────
artifacts:
  objects:
    location: "gs://${_CACHE_BUCKET}/artifacts/$BUILD_ID/"
    paths:
      - "bazel-krn-bin/src/sonic-linux-kernel/*.deb"
      - "bazel-orch-bin/src/sonic-swss/swss_*.deb"
      - "bazel-brd-bin/platform/broadcom/sonic_broadcom_bin.bin"
