timeout: 7200s

options:
  logging: CLOUD_LOGGING_ONLY
  pool:
    name: projects/$PROJECT_ID/locations/us-central1/workerPools/${_PRIMARY_POOL}

substitutions:
  _PRIMARY_POOL: sonic-primary
  _AFFECTED_LABELS: //bazel/... //tools/... //sources/... //packages/... //images/... //platforms/... //installers/...

steps:
  - id: presubmit
    name: gcr.io/cloud-builders/gcloud
    allowFailure: true
    entrypoint: bash
    env:
      - USE_BAZEL_VERSION=8.5.0
      - SONIC_AFFECTED_LABELS=${_AFFECTED_LABELS}
    args:
      - -lc
      - ./ci/gcp/presubmit.sh

  - id: presubmit-summary
    name: gcr.io/cloud-builders/gcloud
    waitFor:
      - presubmit
    entrypoint: bash
    args:
      - -lc
      - |
        summary="out/bazel-migration/presubmit/summary.txt"
        if [[ ! -f "${summary}" ]]; then
          echo "Missing presubmit summary: ${summary}" >&2
          exit 1
        fi

        echo "== presubmit summary =="
        cat "${summary}"

        status="$(awk -F= '$1=="status" {print $2}' "${summary}" | tail -1)"
        if [[ "${status}" != "success" ]]; then
          exit 1
        fi
