# SONiC Buildimage — GCP Cloud Build CI pipeline
#
# Trigger: push to `claude` branch
#
# To run locally:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_PROJECT_ID=$(gcloud config get-value project)
#
# Required substitutions (set in Cloud Build trigger):
#   _PROJECT_ID    — GCP project ID
#   _CACHE_BUCKET  — GCS bucket for Bazel remote cache
#   _AR_REGION     — Artifact Registry region (e.g. us-central1)
#
# Pipeline:
#   1. Install Bazelisk
#   2. Init submodules
#   3. Align submodules to 202405
#   4. Copy BUILD.bazel into submodules (from baxia-lan forks)
#   5. Build kernel (.deb packages)
#   6. Build orchagent chain (docker-orchagent)
#   7. Build docker-sonic-vs (hermetic OCI image)
#   8. Run pytest (test_port.py)
#   9. Build sonic-broadcom.bin (ONIE installer)

substitutions:
  _PROJECT_ID: "REPLACE_WITH_PROJECT_ID"
  _CACHE_BUCKET: "sonic-bazel-cache"
  _AR_REGION: "us-central1"
  _AR_REPO: "sonic"

options:
  machineType: "N1_HIGHCPU_32"
  env:
    - "PROJECT_ID=${_PROJECT_ID}"
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

timeout: "7200s"

steps:
  # ── Step 1: Install Bazelisk ─────────────────────────────────────────────────
  - id: "install-bazelisk"
    name: "ubuntu"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq curl git >/dev/null
        curl -fsSL -o /usr/local/bin/bazel \
          https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64
        chmod +x /usr/local/bin/bazel
        bazel version
    waitFor: ["-"]
    timeout: "120s"
    volumes:
      - name: "usr-local"
        path: "/usr/local"

  # ── Step 2: Init submodules ──────────────────────────────────────────────────
  - id: "init-submodules"
    name: "gcr.io/cloud-builders/git"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        git submodule update --init --recursive
    waitFor: ["-"]
    timeout: "600s"

  # ── Step 3: Align submodules to 202405 ───────────────────────────────────────
  - id: "align-submodules"
    name: "gcr.io/cloud-builders/git"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        for mod in sonic-swss-common sonic-sairedis sonic-swss sonic-dash-api sonic-linux-kernel sonic-stp sonic-gnmi sonic-mgmt-common; do
          if [ -d "src/$$mod" ]; then
            cd "src/$$mod"
            git remote add upstream "https://github.com/sonic-net/$$mod.git" 2>/dev/null || true
            git fetch upstream --tags 2>/dev/null || true
            cd ../..
          fi
        done
        cd src/sonic-swss-common && git checkout 36f40a1bae12a4ff28314eaa8223a6fe1b636492 && cd ../..
        cd src/sonic-sairedis && git checkout edd144b643b67c791c99bbca6920531102f2bf84 && cd ../..
        cd src/sonic-sairedis/SAI && git checkout 408d75b610cb6b8d90e21d3bbd7f84586ebd1e1e && cd ../../..
        cd src/sonic-swss && git checkout 6785d6620804cd0b32db7e8adb7e7dad99ae4a78 && cd ../..
        cd src/sonic-dash-api && git checkout 3f6709001e8574743ecf1a44f4cc3eb26b6329d6 && cd ../..
        cd src/sonic-linux-kernel && git checkout feaf559f38133c9fa649a468c5e589641c77de76 && cd ../..
        echo "Submodules aligned to 202405"
    waitFor: ["init-submodules"]
    timeout: "300s"

  # ── Step 4: Copy BUILD.bazel into submodules ─────────────────────────────────
  # MUST run AFTER align — git checkout reverts files, so we re-download
  - id: "copy-build-files"
    name: "ubuntu"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq curl >/dev/null
        GITHUB_BASE="https://raw.githubusercontent.com/baxia-lan"
        for mod in sonic-swss-common sonic-sairedis sonic-swss sonic-dash-api sonic-stp sonic-linux-kernel sonic-gnmi; do
          if [ -d "src/$$mod" ]; then
            for f in BUILD.bazel MODULE.bazel BUILD.bazel.hermetic config.h; do
              curl -fsSL "$${GITHUB_BASE}/$${mod}/claude/$${f}?t=$$(date +%s)" \
                -o "src/$$mod/$$f" 2>/dev/null && echo "  + src/$$mod/$$f" || true
            done
          fi
        done
        echo "Kernel cpupower fix:"
        grep "cpupower" src/sonic-linux-kernel/BUILD.bazel | head -3 || echo "WARNING: no cpupower fix"
    waitFor: ["align-submodules"]
    timeout: "300s"

  # ── Step 5: Build kernel ─────────────────────────────────────────────────────
  - id: "build-kernel"
    name: "ubuntu"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq curl git python3 >/dev/null
        grep "popd" src/sonic-linux-kernel/BUILD.bazel && echo "popd fix present" || echo "WARNING: popd fix missing"
        bazel clean 2>/dev/null || true
        bazel build //src/sonic-linux-kernel:linux_kernel_debs \
          --remote_cache=https://storage.googleapis.com/sonic-bazel-cache \
          --google_default_credentials \
          --spawn_strategy=local \
          --jobs=$$(nproc)
        echo "=== Kernel debs ==="
        ls -lh bazel-bin/src/sonic-linux-kernel/*.deb
    waitFor: ["copy-build-files", "install-bazelisk"]
    timeout: "3600s"
    volumes:
      - name: "usr-local"
        path: "/usr/local"

  # ── Step 6: Build orchagent chain ────────────────────────────────────────────
  - id: "build-orchagent"
    name: "ubuntu"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq curl git python3 >/dev/null
        bazel build //dockers/docker-orchagent:docker_orchagent \
          --remote_cache=https://storage.googleapis.com/sonic-bazel-cache \
          --google_default_credentials \
          --spawn_strategy=local \
          --jobs=$$(nproc)
        echo "=== Built packages ==="
        find bazel-bin/src -name "*.deb" -size +0 | wc -l
        echo "deb packages"
    waitFor: ["build-kernel"]
    timeout: "3600s"
    volumes:
      - name: "usr-local"
        path: "/usr/local"

  # ── Step 7: Build docker-sonic-vs ────────────────────────────────────────────
  - id: "build-docker-sonic-vs"
    name: "ubuntu"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq curl git python3 >/dev/null
        bazel build //platform/vs:docker_sonic_vs_tarball \
          --remote_cache=https://storage.googleapis.com/sonic-bazel-cache \
          --google_default_credentials \
          --spawn_strategy=local \
          --strategy=CopyToDirectory=local \
          --jobs=$$(nproc) \
          --check_direct_dependencies=off
        echo "=== docker-sonic-vs tarball ==="
        ls -lh bazel-bin/platform/vs/docker_sonic_vs_tarball* 2>/dev/null || true
    waitFor: ["build-orchagent"]
    timeout: "3600s"
    volumes:
      - name: "usr-local"
        path: "/usr/local"

  # ── Step 8: Run pytest ───────────────────────────────────────────────────────
  - id: "pytest-vs"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        echo "=== Load docker-sonic-vs image ==="
        bash bazel-bin/platform/vs/docker_sonic_vs_tarball.sh

        echo "=== Tag image ==="
        docker tag sonic/docker_sonic_vs:latest docker-sonic-vs:latest

        echo "=== Install pytest dependencies ==="
        pip3 install pytest docker redis 2>/dev/null || true

        echo "=== Smoke test: start container and verify services ==="
        CONTAINER_ID=$$(docker run -d --privileged docker-sonic-vs:latest)
        echo "Container: $$CONTAINER_ID"

        for i in $$(seq 1 24); do
          if docker exec "$$CONTAINER_ID" redis-cli ping 2>/dev/null | grep -q PONG; then
            echo "Redis is up after $$((i * 5))s"
            break
          fi
          if [ "$$i" -eq 24 ]; then
            echo "WARNING: Redis did not respond within 120s"
            docker logs "$$CONTAINER_ID" | tail -50
          fi
          sleep 5
        done

        echo "=== Run pytest ==="
        cd src/sonic-swss/tests
        python3 -m pytest --imgname=docker-sonic-vs:latest -v test_port.py -x --timeout=300 || TEST_RC=$$?

        echo "=== Cleanup ==="
        docker stop "$$CONTAINER_ID" || true
        docker rm "$$CONTAINER_ID" || true

        echo "=== Test result ==="
        if [ "$${TEST_RC:-0}" -ne 0 ]; then
          echo "WARN: pytest exited with code $${TEST_RC}"
          exit "$${TEST_RC}"
        else
          echo "All tests passed"
        fi
    waitFor: ["build-docker-sonic-vs"]
    timeout: "600s"

  # ── Step 9: Build sonic-broadcom.bin ─────────────────────────────────────────
  - id: "build-broadcom-bin"
    name: "ubuntu"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq curl git python3 >/dev/null
        bazel build //platform/broadcom:sonic_broadcom_bin \
          --remote_cache=https://storage.googleapis.com/sonic-bazel-cache \
          --google_default_credentials \
          --spawn_strategy=local \
          --jobs=$$(nproc)
        echo "=== sonic-broadcom.bin ==="
        ls -lh bazel-bin/platform/broadcom/sonic_broadcom_bin.bin
        SIZE_MB=$$(( $$(stat -c%s bazel-bin/platform/broadcom/sonic_broadcom_bin.bin) / 1048576 ))
        echo "sonic-broadcom.bin: $${SIZE_MB} MB"
        if [ "$$SIZE_MB" -gt 400 ]; then
          echo "FAIL: exceeds 400 MB budget"
          exit 1
        fi
        echo "PASS: within 400 MB budget"
    waitFor: ["build-orchagent"]
    timeout: "3600s"
    volumes:
      - name: "usr-local"
        path: "/usr/local"

# ── Artifact storage ─────────────────────────────────────────────────────────
artifacts:
  objects:
    location: "gs://sonic-bazel-cache/artifacts/${SHORT_SHA}/"
    paths:
      - "bazel-bin/src/sonic-linux-kernel/*.deb"
      - "bazel-bin/src/sonic-swss/swss_*.deb"
      - "bazel-bin/platform/broadcom/sonic_broadcom_bin.bin"
