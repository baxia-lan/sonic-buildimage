version: 1

sources:
  - channel: bookworm main
    url: https://snapshot.debian.org/archive/debian/20260401T000000Z
  - channel: bookworm-security main
    url: https://snapshot.debian.org/archive/debian-security/20260401T000000Z

archs:
  - amd64

packages:
  # C/C++ sysroot
  - libc6-dev
  - libgcc-12-dev
  - libstdc++-12-dev
  - libstdc++6
  - linux-libc-dev

  # SONiC C++ build deps
  - libnl-3-dev
  - libnl-genl-3-dev
  - libnl-route-3-dev
  - libnl-nf-3-dev
  - libhiredis-dev
  - libboost-dev
  - libboost-serialization-dev
  - libzmq3-dev
  - nlohmann-json3-dev
  - libprotobuf-dev
  - protobuf-compiler
  - libyang2-dev
  - libjansson-dev
  - libteam-dev
  - libgtest-dev
  - libgmock-dev
  - uuid-dev
  - libjemalloc-dev
  - libelf-dev
  - libssl-dev

  # Runtime packages for OCI layers
  - iproute2
  - redis-server
  - redis-tools
  - rsyslog
  - procps
  - jq
  - iputils-ping
  - bridge-utils
  - conntrack
  - iptables
  - tcpdump
  - arping
  - ndisc6
  - python3
  - python3-protobuf
  - python3-netifaces
  - python3-yaml
  - ebtables
  - ndppd
  - dmidecode
  - logrotate
  - ifupdown
  - net-tools
  - ipmitool
  - pciutils
  - libteam-utils
  - python3-pip
